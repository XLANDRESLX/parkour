<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkour Infinito - Neo Edition (Multiplayer)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: #0a0b10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Contenedores de la Interfaz Superior */
        #ui {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            z-index: 10;
            background: #0f172a;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        #pauseBtn {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            background: #0f172a;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
        }
        #pauseBtn:hover {
            background: #334155;
            border-color: #00f2fe;
        }

        /* Pantallas de Menú (Inicio, Pausa y Game Over) */
        .screen-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #04060c;
            color: white;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        #gameOver, #pauseMenu {
            display: none;
            opacity: 0;
        }

        #gameOver.active, #pauseMenu.active {
            display: flex;
            opacity: 1;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 5px;
            font-weight: 900;
            color: #00f2fe;
            letter-spacing: 2px;
        }

        #gameOver h1 {
            color: #ff416c;
        }
        
        #pauseMenu h1 {
            color: #94a3b8;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #94a3b8;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .highscore-text {
            font-size: 1.1rem;
            color: #00f2fe;
            margin-top: -20px;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Selector de Dificultad */
        .difficulty-container {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .diff-btn {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 700;
            background: #1e293b;
            border: 2px solid #334155;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .diff-btn.selected[data-diff="facil"] { background: #10b981; color: white; border-color: #34d399; }
        .diff-btn.selected[data-diff="medio"] { background: #f59e0b; color: white; border-color: #fbbf24; }
        .diff-btn.selected[data-diff="dificil"] { background: #ef4444; color: white; border-color: #f87171; }

        /* Controles */
        .controls-info {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 35px;
            font-size: 14px;
            color: #cbd5e1;
            text-align: center;
            line-height: 1.6;
        }
        .controls-info span {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #fff;
        }

        /* Grupo de botones de los menús */
        .menu-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        /* Botón Principal */
        .btn-main {
            padding: 16px 45px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: #764ba2;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            text-align: center;
        }

        .btn-main:hover {
            background: #633b8a;
            transform: translateY(-2px);
        }
        .btn-main:active { transform: translateY(0); }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #475569;
        }
        .btn-secondary:hover {
            background: #334155;
        }
    </style>
</head>
<body>

<div id="ui">
    SCORE: <span id="score">0</span>m | BEST: <span id="highScoreUI">0</span>m
    <span id="diffBadge" style="font-size:13px; margin-left:10px; padding:3px 8px; border-radius:4px; font-weight:bold;"></span>
</div>

<button id="pauseBtn" onclick="togglePause()">PAUSA (P)</button>

<div id="startMenu" class="screen-overlay">
    <h1>CYBER RUNNER</h1>
    <p class="subtitle">Supera las plataformas en el vacío infinito</p>
    <div id="mainHighScore" class="highscore-text">RÉCORD (MEDIO): 0m</div>
    
    <div class="controls-info">
        Moverse: <span>A / D</span> o <span>← / →</span> &nbsp;|&nbsp; Saltar: <span>Espacio / W</span> &nbsp;|&nbsp; Dash: <span>Shift</span> &nbsp;|&nbsp; Pausa: <span>P</span>
    </div>

    <div class="difficulty-container">
        <button class="diff-btn" data-diff="facil" onclick="setDifficulty('facil')">FÁCIL</button>
        <button class="diff-btn selected" data-diff="medio" onclick="setDifficulty('medio')">MEDIO</button>
        <button class="diff-btn" data-diff="dificil" onclick="setDifficulty('dificil')">DIFÍCIL</button>
    </div>

    <button class="btn-main" style="width: 250px;" onclick="startGame()">JUGAR AHORA</button>
</div>

<div id="pauseMenu" class="screen-overlay">
    <h1>SISTEMA EN PAUSA</h1>
    <p class="subtitle" style="margin-bottom: 25px;">Progreso retenido en el búfer</p>
    <div class="menu-actions">
        <button class="btn-main" onclick="togglePause()">REANUDAR</button>
        <button class="btn-main btn-secondary" onclick="returnToMenu()">VOLVER AL INICIO</button>
    </div>
</div>

<div id="gameOver" class="screen-overlay">
    <h1>SISTEMA CAÍDO</h1>
    <h2 id="finalScore" class="subtitle" style="margin-bottom: 10px;">Distancia recorrida: 0m</h2>
    <div id="gameOverHighScore" class="highscore-text" style="margin-bottom: 35px;">¡NUEVO RÉCORD!</div>
    <div class="menu-actions">
        <button class="btn-main" onclick="restart()">RECONECTAR</button>
        <button class="btn-main btn-secondary" onclick="returnToMenu()">MENÚ PRINCIPAL</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
// ==========================================
// CONFIGURACIÓN DE RED (SUPABASE REALTIME)
// ==========================================
const SUPABASE_URL = "https://lnnbozsabxvvpiacwazu.supabase.co";
const SUPABASE_KEY = "sb_publishable_9BkoeLClXFS0jkwHCV14lw_-cy5X-kC";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const myId = Math.random().toString(36).substring(2, 9); 
let remotePlayers = {}; 

const gameChannel = supabaseClient.channel('cyber-room', {
    config: { broadcast: { self: false } } 
});

gameChannel
    .on('broadcast', { event: 'move' }, (payload) => {
        remotePlayers[payload.payload.id] = payload.payload.data;
    })
    .subscribe();

// ==========================================
// LÓGICA DEL MOTOR GRÁFICO Y JUEGO
// ==========================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let GROUND_Y = window.innerHeight - 140;
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    GROUND_Y = canvas.height - 140;
}
resize();
window.addEventListener("resize", resize);

const imgPlatform = new Image();
imgPlatform.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"><defs><linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="%231e293b"/><stop offset="100%" stop-color="%230f172a"/></linearGradient></defs><rect x="0" y="0" width="32" height="32" fill="url(%23g)"/><rect x="0" y="0" width="32" height="4" fill="%2300f2fe"/><rect x="0" y="4" width="32" height="1" fill="%23006677"/></svg>';

const imgPlayer = new Image();
imgPlayer.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 32" width="128" height="32"><g fill="%2300f2fe"><rect x="6" y="2" width="20" height="24" rx="3"/><rect x="38" y="4" width="20" height="22" rx="3"/><rect x="70" y="2" width="20" height="24" rx="3"/><rect x="102" y="5" width="20" height="22" rx="3"/></g><g fill="%23ffffff"><circle cx="20" cy="8" r="2"/><circle cx="52" cy="10" r="2"/><circle cx="84" cy="8" r="2"/><circle cx="116" cy="11" r="2"/></g><g fill="%23764ba2"><rect x="4" y="24" width="24" height="4"/><rect x="36" y="24" width="24" height="4"/><rect x="68" y="24" width="24" height="4"/><rect x="100" y="24" width="24" height="4"/></g></svg>';

const spriteConfig = {
    frameWidth: 32,   
    frameHeight: 32,  
    totalFrames: 4,   
    animSpeed: 5      
};

const difficultySettings = {
    facil: { gapMin: 90, gapMax: 130, widthMin: 220, widthMax: 300, speedModifier: 1.0, label: "FÁCIL", color: "#10b981" },
    medio: { gapMin: 120, gapMax: 170, widthMin: 160, widthMax: 240, speedModifier: 1.2, label: "MEDIO", color: "#f59e0b" },
    dificil: { gapMin: 150, gapMax: 220, widthMin: 110, widthMax: 170, speedModifier: 1.5, label: "DIFÍCIL", color: "#ef4444" }
};
let currentDiff = "medio";

function getHighScore(diff) {
    return parseInt(localStorage.getItem("cyberrunner_highscore_" + diff)) || 0;
}

function updateHighScoreDisplay() {
    const record = getHighScore(currentDiff);
    document.getElementById("mainHighScore").textContent = `RÉCORD (${difficultySettings[currentDiff].label}): ${record}m`;
    document.getElementById("highScoreUI").textContent = record;
}

function setDifficulty(tier) {
    currentDiff = tier;
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.classList.remove('selected');
        if(btn.getAttribute('data-diff') === tier) btn.classList.add('selected');
    });
    updateHighScoreDisplay();
}

const keys = {};
window.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    keys[key] = true;
    if(e.code === "Space" || e.code === "ArrowUp" || key === "w") jump();
    if(e.key === "Shift") dash();
    if(key === "p" || e.key === "Escape") togglePause();
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

const gravity = 0.65;
let cameraX = 0;
let score = 0;
let gameRunning = false;
let isPaused = false;
let initialized = false;
let player;
let platforms = [];
let particles = [];
let gameTicks = 0;

let stars = [];
for(let i=0; i<60; i++) {
    stars.push({x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.7 + 0.3});
}

function resetPlayer(){
    player = {
        x: 200,
        y: GROUND_Y - 120,
        w: 42,
        h: 56,
        vx: 0,
        vy: 0,
        jumps: 2,
        facing: 1,
        dashCooldown: 0,
        dashActive: 0,
        currentFrame: 0
    };
}

function createWorld(){
    platforms = [];
    particles = [];
    platforms.push({ x: 0, y: GROUND_Y, w: 900, h: 600 });

    let lastX = 900;
    for(let i = 0; i < 15; i++){
        addPlatform(lastX);
        lastX = platforms[platforms.length - 1].x + platforms[platforms.length - 1].w;
    }
}

function addPlatform(startX){
    const diff = difficultySettings[currentDiff];
    const progression = Math.min(score / 2000, 0.4); 
    
    const gap = (diff.gapMin + Math.random() * (diff.gapMax - diff.gapMin)) * (1 + progression);
    const width = (diff.widthMin + Math.random() * (diff.widthMax - diff.widthMin)) * (1 - progression * 0.5);
    
    const heightRange = currentDiff === 'facil' ? 80 : 160;
    const height = GROUND_Y - (Math.random() * heightRange - 40);

    platforms.push({ x: startX + gap, y: height, w: width, h: 600 });
}

function generateMore(){
    const last = platforms[platforms.length - 1];
    if(last.x < player.x + canvas.width + 1000){
        let lastX = last.x + last.w;
        for(let i = 0; i < 8; i++){
            addPlatform(lastX);
            lastX = platforms[platforms.length - 1].x + platforms[platforms.length - 1].w;
        }
    }
}

function createParticle(x, y, color) {
    particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        radius: Math.random() * 3 + 1,
        alpha: 1,
        color: color
    });
}

function jump(){
    if(!gameRunning || isPaused) return;
    if(player.jumps > 0){
        player.vy = -13.5;
        player.jumps--;
        for(let i=0; i<8; i++) createParticle(player.x + player.w/2, player.y + player.h, '#00f2fe');
    }
}

function dash(){
    if(!gameRunning || player.dashCooldown > 0 || isPaused) return;
    player.dashActive = 9;
    player.dashCooldown = 35;
    for(let i=0; i<12; i++) createParticle(player.x + player.w/2, player.y + player.h/2, '#764ba2');
}

function rects(a, b){
    return (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y);
}

function togglePause() {
    if(!gameRunning) return;
    
    isPaused = !isPaused;
    const menu = document.getElementById("pauseMenu");
    
    if(isPaused) {
        menu.style.display = "flex";
        setTimeout(() => menu.classList.add("active"), 10);
        document.getElementById("pauseBtn").textContent = "REANUDAR (P)";
    } else {
        menu.classList.remove("active");
        setTimeout(() => menu.style.display = "none", 300);
        document.getElementById("pauseBtn").textContent = "PAUSA (P)";
    }
}

function returnToMenu() {
    gameRunning = false;
    isPaused = false;
    document.getElementById("pauseMenu").classList.remove("active");
    document.getElementById("gameOver").classList.remove("active");
    setTimeout(() => {
        document.getElementById("pauseMenu").style.display = "none";
        document.getElementById("gameOver").style.display = "none";
        document.getElementById("startMenu").style.display = "flex";
        document.getElementById("ui").style.display = "none";
        document.getElementById("pauseBtn").style.display = "none";
    }, 300);
    updateHighScoreDisplay();
}

function startGame() {
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("pauseBtn").style.display = "block";
    
    const badge = document.getElementById("diffBadge");
    badge.textContent = difficultySettings[currentDiff].label;
    badge.style.backgroundColor = difficultySettings[currentDiff].color;

    score = 0;
    gameTicks = 0;
    resetPlayer();
    createWorld();
    updateHighScoreDisplay();
    
    gameRunning = true;
    isPaused = false;
    
    if(!initialized) {
        initialized = true;
        loop();
    }
}

function restart() {
    document.getElementById("gameOver").classList.remove("active");
    setTimeout(() => {
        document.getElementById("gameOver").style.display = "none";
        startGame();
    }, 300);
}

function triggerGameOver() {
    gameRunning = false;
    const currentHigh = getHighScore(currentDiff);
    const badgeContainer = document.getElementById("gameOverHighScore");
    
    document.getElementById("finalScore").textContent = `Distancia recorrida: ${score}m`;
    
    if(score > currentHigh) {
        localStorage.setItem("cyberrunner_highscore_" + currentDiff, score);
        badgeContainer.textContent = "¡NUEVO RÉCORD GLOBAL CONFIGURADO!";
        badgeContainer.style.color = "#10b981";
    } else {
        badgeContainer.textContent = `Récord actual: ${currentHigh}m`;
        badgeContainer.style.color = "#00f2fe";
    }
    
    const goMenu = document.getElementById("gameOver");
    goMenu.style.display = "flex";
    setTimeout(() => goMenu.classList.add("active"), 10);
}

// ==========================================
// BUCLE PRINCIPAL DE JUEGO (LOOP)
// ==========================================
function loop() {
    requestAnimationFrame(loop);
    
    if(!gameRunning || isPaused) {
        // Seguir dibujando el fondo congelado para que no parpadee la pantalla
        draw();
        return;
    }
    
    update();
    draw();
}

function update() {
    gameTicks++;
    const diff = difficultySettings[currentDiff];
    
    // Reducir temporizadores del Dash
    if(player.dashActive > 0) player.dashActive--;
    if(player.dashCooldown > 0) player.dashCooldown--;
    
    // Movimiento lateral e inercia
    let moveSpeed = player.dashActive > 0 ? 14 : 5.5 * diff.speedModifier;
    
    if (keys['a'] || keys['arrowleft']) {
        player.vx = -moveSpeed;
        player.facing = -1;
    } else if (keys['d'] || keys['arrowright']) {
        player.vx = moveSpeed;
        player.facing = 1;
    } else {
        player.vx *= 0.8; // Fricción
    }
    
    // Gravedad
    if(player.dashActive === 0) {
        player.vy += gravity;
    } else {
        player.vy = 0; // No caer durante el dash
    }
    
    // Guardar posiciones previas para colisión limpia
    let prevX = player.x;
    let prevY = player.y;
    
    player.x += player.vx;
    player.y += player.vy;
    
    // Controlar animación del Sprite de correr
    if(Math.abs(player.vx) > 0.5 && player.vy === 0) {
        if(gameTicks % spriteConfig.animSpeed === 0) {
            player.currentFrame = (player.currentFrame + 1) % spriteConfig.totalFrames;
        }
    } else if(player.vy !== 0) {
        player.currentFrame = 1; // Cuadro de salto fijo
    } else {
        player.currentFrame = 0; // Cuadro quieto
    }
    
    // Detección de colisiones con plataformas
    let onGround = false;
    
    for(let plat of platforms) {
        if(rects(player, plat)) {
            // Venía cayendo desde arriba
            if(prevY + player.h <= plat.y && player.vy > 0) {
                player.y = plat.y - player.h;
                player.vy = 0;
                player.jumps = 2;
                onGround = true;
            }
            // Chocar lateralmente con los muros de las plataformas
            else if(prevX + player.w <= plat.x && player.vx > 0) {
                player.x = plat.x - player.w;
                player.vx = 0;
            }
            else if(prevX >= plat.x + plat.w && player.vx < 0) {
                player.x = plat.x + plat.w;
                player.vx = 0;
            }
        }
    }
    
    // Si corre por el borde se le quita un salto
    if(!onGround && player.vy > 0 && player.jumps === 2) {
        player.jumps = 1;
    }
    
    // Actualizar Score dinámico en metros en base a la x máxima alcanzada
    let currentMeters = Math.floor(player.x / 40);
    if(currentMeters > score) {
        score = currentMeters;
        document.getElementById("score").textContent = score;
    }
    
    // Cámara fluida que sigue al jugador en el eje X
    cameraX = player.x - 200;
    
    // Generación procedural infinita
    generateMore();
    
    // Actualizar partículas decorativas
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        if(p.alpha <= 0) particles.splice(i, 1);
    }
    
    // Condición de caída al vacío (Muerte)
    if(player.y > canvas.height + 100) {
        triggerGameOver();
    }
    
    // Transmitir posición al servidor para el modo multijugador
    if(gameTicks % 3 === 0) { // Limitar tasa de envío a Supabase para evitar saturación
        gameChannel.send({
            type: 'broadcast',
            event: 'move',
            payload: {
                id: myId,
                data: { x: player.x, y: player.y, f: player.facing, frame: player.currentFrame }
            }
        });
    }
}

function draw() {
    // Limpiar pantalla con color plano oscuro
    ctx.fillStyle = "#0a0b10";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Dibujar Red Estelar de Fondo Parallax
    ctx.fillStyle = "#ffffff";
    for(let star of stars) {
        let x = (star.x * canvas.width - cameraX * 0.15) % canvas.width;
        if(x < 0) x += canvas.width;
        let y = star.y * canvas.height;
        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(x, y, star.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;
    
    ctx.save();
    ctx.translate(-cameraX, 0);
    
    // Dibujar Partículas
    for(let p of particles) {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;
    
    // Dibujar Plataformas Modulares
    for(let plat of platforms) {
        if(plat.x + plat.w > cameraX && plat.x < cameraX + canvas.width) {
            // Dibujar patrón repetitivo plano usando el SVG incrustado
            for(let sx = 0; sx < plat.w; sx += 32) {
                let blockW = Math.min(32, plat.w - sx);
                ctx.drawImage(imgPlatform, 0, 0, blockW, 32, plat.x + sx, plat.y, blockW, 32);
            }
            // Rellenar la base inferior de la plataforma de color sólido
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(plat.x, plat.y + 32, plat.w, plat.h - 32);
        }
    }
    
    // Dibujar Jugadores Remotos (Tus amigos en tiempo real)
    ctx.fillStyle = "rgba(239, 68, 68, 0.4)"; // Sombra plana roja para distinguir aliados
    for(let id in remotePlayers) {
        let p = remotePlayers[id];
        ctx.save();
        ctx.translate(p.x + 21, p.y + 28);
        if(p.f === -1) ctx.scale(-1, 1);
        ctx.drawImage(
            imgPlayer,
            p.frame * spriteConfig.frameWidth, 0, spriteConfig.frameWidth, spriteConfig.frameHeight,
            -21, -28, 42, 56
        );
        ctx.restore();
        
        // Indicador de texto superior para el jugador remoto
        ctx.fillStyle = "#ef4444";
        ctx.font = "bold 11px monospace";
        ctx.fillText("PLAYER", p.x + 1, p.y - 10);
    }
    
    // Dibujar Jugador Principal (Tú)
    if(player) {
        ctx.save();
        ctx.translate(player.x + (player.w / 2), player.y + (player.h / 2));
        if(player.facing === -1) ctx.scale(-1, 1);
        
        ctx.drawImage(
            imgPlayer,
            player.currentFrame * spriteConfig.frameWidth, 0, spriteConfig.frameWidth, spriteConfig.frameHeight,
            -(player.w / 2), -(player.h / 2), player.w, player.h
        );
        ctx.restore();
    }
    
    ctx.restore();
}

updateHighScoreDisplay();
</script>
